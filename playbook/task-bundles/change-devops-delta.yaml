name: change-devops-delta
role: devops
always_load:
  - playbook/summaries/global-core.md
  - playbook/summaries/process-core.md
  - playbook/summaries/roles/devops.summary.md
  - playbook/process/read-sets/devops-core.md
required_phase:
  - playbook/process/phases/phase-I4-design-delta.md
required_artifacts:
  - runs/current/artifacts/architecture/runtime-bom.md
  - runs/current/artifacts/architecture/route-and-entry-model.md
writable_targets:
  - runs/current/changes/*/candidate/artifacts/devops/**
  - runs/current/changes/*/verification/**
  - runs/current/role-state/devops/**
  - app/.gitignore
  - app/Dockerfile
  - app/docker-compose.yml
  - app/nginx.conf
  - app/entrypoint.sh
  - app/install.sh
  - app/run.sh
