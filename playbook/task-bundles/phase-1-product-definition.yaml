name: phase-1-product-definition
role: product_manager
always_load:
  - playbook/summaries/global-core.md
  - playbook/summaries/process-core.md
  - playbook/summaries/roles/product-manager.summary.md
  - playbook/process/read-sets/product-manager-core.md
required_phase:
  - playbook/process/phases/phase-1-product-definition.md
required_artifacts:
  - runs/current/input.md
  - runs/current/artifacts/architecture/capability-profile.md
  - runs/current/artifacts/architecture/load-plan.md
  - runs/current/artifacts/product/research-notes.md
conditional_artifacts:
  sparse_input:
    - runs/current/artifacts/product/input-interpretation.md
  example_comparison:
    - examples/README.md
reference_only:
  - specs/product/README.md
  - specs/product/sample-data.md
  - specs/product/traceability-matrix.md
writable_targets:
  - runs/current/artifacts/product/**
  - runs/current/role-state/product_manager/**
